# Central run configuration for the equity ranking pipeline.

universe:
  # Number of large-cap constituents to simulate.
  sp500_limit: 25
  # Use Yahoo screener for a live universe; false uses the bundled fallback sample.
  use_yahoo_screener: false

dates:
  start: "2022-01-01"
  end: "2023-01-01"

features:
  momentum_windows: [5, 20]
  volatility_window: 20
  trend_window: 60

validation:
  n_splits: 3
  test_size: null        # null -> auto-sized from data
  min_train_size: null   # null -> 2 * test_size

portfolio:
  long_quantile: 0.2
  short_quantile: 0.2
  transaction_cost_bps: 10.0

model:
  default: advanced_ensemble
